# Uses dbt-databricks. Install with:  pip install dbt-databricks
# Reads from your Free Edition SQL Warehouse. Set these env vars first:
#   DATABRICKS_HOST       = dbc-61ca3723-5fde.cloud.databricks.com   (no https://)
#   DATABRICKS_HTTP_PATH  = /sql/1.0/warehouses/5b6dcbc812fb1238
#   DATABRICKS_TOKEN      = <fresh rotated PAT>
github_events:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') | replace('https://', '') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG', 'workspace') }}"   # Unity Catalog (Free Edition)
      schema: gh_gold
      threads: 4
