# Minimal, space-efficient Airflow: single container, SQLite + LocalExecutor.
# No Postgres/Redis/Celery. Good enough for a portfolio pipeline; not for prod scale.
services:
  airflow:
    image: apache/airflow:2.9.3-python3.11
    container_name: gh_airflow
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      # Databricks connection — read by the DAG from these env vars
      DATABRICKS_HOST: ${DATABRICKS_HOST}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
      DATABRICKS_CATALOG: ${DATABRICKS_CATALOG:-workspace}
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      # Mount the producer + certs so the ingestion task can run inside Airflow.
      # config.py treats /opt/airflow as the project root, so certs resolve to /opt/airflow/certs.
      - ../producer:/opt/airflow/producer
      - ../certs:/opt/airflow/certs
    ports:
      - "8080:8080"
    command: >
      bash -c "
      pip install --no-cache-dir -r /opt/airflow/producer/requirements.txt &&
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Adnan --lastname Anam --role Admin --email admin@example.com || true &&
      (airflow scheduler &) &&
      exec airflow webserver
      "
